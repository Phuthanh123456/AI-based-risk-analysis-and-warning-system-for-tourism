# =========================
# 3) Fatality / severity boosters (để tính điểm heatmap)
# =========================
fatality_keywords:
  - "tử vong"
  - "chết"
  - "thiệt mạng"
  - "tử nạn"
  - "tửong vong"   # lỗi chính tả hay gặp
  - "bị thương nặng"
  - "bị thương"
  - "nguy kịch"
  - "mất tích"
  - "hôn mê"
  - "đa chấn thương"
  - "cứu chữa"
  - "khẩn cấp"
  - "thảm kịch"
  - "thảm họa"

# =========================
# 4) Keep / Drop heuristics (đỡ mất bài khi cào nhiều)
# =========================
filtering:
  # nếu bài match risk_keywords >= ngưỡng thì giữ, kể cả tourism_context yếu
  risk_min_hits_keep: 1

  # nếu match tourism_context >= ngưỡng thì coi là bài du lịch
  tourism_min_hits: 1

  # bỏ bài nếu rơi vào “chỉ là cẩm nang/khuyến mãi” và không có risk
  drop_if_only_soft_negative: true

# =========================
# 5) Scoring rules để ra "risk_score" (cho heatmap)
# =========================
scoring:
  # điểm nền cho mỗi nhóm risk match
  group_base_score:
    Pricing_Issue: 2.0
    Environmental_Cleanliness: 2.0
    Safety_Security: 2.5
    Natural_Disaster: 2.5
    Fire_Accident_Risk: 3.0

  # mỗi hit keyword thêm bao nhiêu (cap để tránh bài dài bị inflate)
  per_hit_add: 0.5
  per_group_hit_cap: 6

  # fatality booster
  fatality_boost: 4.0
  fatality_cap: 2   # tối đa 2 lần boost

  # tổng score cap
  total_score_cap: 20.0
