services:
  - type: web
    name: travel-risk-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      # Pin Python version — pandas==2.2.2 has no prebuilt wheel for newer
      # Python (e.g. 3.13), which forces a from-source build and fails.
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
      - key: OPENWEATHERMAP_API_KEY
        sync: false
      - key: SERPAPI_KEYS
        sync: false
      - key: TRACKASIA_KEY
        sync: false
      - key: TRACKASIA_BASE
        value: https://maps.track-asia.com
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_CONTACT_EMAIL
        sync: false
    # Note: Render's free tier does not support persistent disks, so the
    # SQLite database (users/trip_history/push_subscriptions) resets on
    # every redeploy. Upgrade to a paid plan and re-add a `disk:` block
    # (see git history) if you need it to persist.
