server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Mirrors vite.config.js's dev proxy so the same relative API paths
    # (fetch("/trip"), fetch("/api/auth/login"), etc.) work in production
    # against the "backend" service name from docker-compose.
    location ~ ^/(api|trip|risk|health|map|gps|traffic|weather|debug)/? {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
